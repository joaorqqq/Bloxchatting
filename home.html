<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxChatting - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        body { background: #313338; color: #dbdee1; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 4px; }
        
        .bg-discord-dark { background: #1e1f22; }
        .bg-discord-darker { background: #2b2d31; }
        .bg-discord-darkest { background: #313338; }
        .bg-discord-sidebar { background: #1e1f22; }
        .text-discord-muted { color: #949ba4; }
        .text-discord-normal { color: #dbdee1; }
        
        .server-icon { transition: all 0.2s ease; position: relative; }
        .server-icon:hover { border-radius: 35%; }
        .server-icon.active { border-radius: 35%; background-color: #5865f2; color: white; }
        .server-icon::before {
            content: ''; position: absolute; left: -8px; top: 50%;
            transform: translateY(-50%); width: 0; height: 8px;
            background: #fff; border-radius: 0 4px 4px 0; transition: all 0.2s ease;
        }
        .server-icon:hover::before { height: 20px; width: 4px; }
        .server-icon.active::before { height: 40px; width: 4px; }
        
        .channel-item:hover { background: #35373c; color: #dbdee1; }
        .channel-active { background: #404249; color: #fff; }
        .message-item:hover { background: #2e3035; }
        .chat-input:focus { border-color: #00aff4; outline: none; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    
    <div class="hidden md:flex flex-col w-[72px] bg-discord-darkest items-center py-3 gap-2 overflow-y-auto shrink-0 z-20">
        <button onclick="showDMs()" id="home-btn" class="server-icon active w-12 h-12 bg-discord-darker rounded-full flex items-center justify-center text-xl hover:bg-[#5865f2] transition-colors">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </button>
        <div class="w-8 h-[2px] bg-discord-darker rounded-full my-1"></div>
        
        <div id="servers-list" class="w-full flex flex-col items-center gap-2"></div>
        
        <button onclick="createNewServer()" class="server-icon w-12 h-12 bg-discord-darker rounded-full flex items-center justify-center text-[#23a55a] text-2xl hover:bg-[#23a55a] hover:text-white transition-all">+</button>
    </div>
    
    <div class="hidden md:flex flex-col w-60 bg-discord-sidebar shrink-0 z-10 border-r border-discord-dark">
        <div class="h-12 px-4 flex items-center justify-between border-b border-discord shadow-sm cursor-pointer hover:bg-discord-darker transition-colors">
            <span class="font-semibold text-white truncate" id="server-name">Mensagens Diretas</span>
        </div>
        
        <div class="flex-1 overflow-y-auto px-2 py-2">
            <div id="dms-view">
                <button onclick="showFindFriend()" class="w-full bg-discord-darkest px-2 py-1.5 rounded text-xs text-discord-muted hover:text-discord-normal transition-colors flex items-center gap-2 mb-4">
                    Buscar ou adicionar amigo
                </button>
                <div class="text-xs font-semibold text-discord-muted uppercase px-2 py-2">Mensagens Diretas</div>
                <div id="friends-list-container">
                    <p class="text-xs text-discord-muted px-2">Carregando amigos...</p>
                </div>
            </div>
            
            <div id="server-channels-view" class="hidden">
                <div class="py-2">
                    <div class="text-xs font-semibold text-discord-muted uppercase px-2 py-1 flex items-center justify-between">
                        <span>CANAIS DE TEXTO</span>
                        <button onclick="createNewChannel()" class="hover:text-white text-lg">+</button>
                    </div>
                    <div id="channels-list-container"></div>
                </div>
            </div>
        </div>
        
        <div class="h-[52px] bg-[#232428] px-2 flex items-center justify-between gap-2">
            <div class="flex items-center gap-2 min-w-0">
                <div class="relative">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&size=64" class="w-8 h-8 rounded-full">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-[#23a55a] border-2 border-[#232428] rounded-full"></div>
                </div>
                <div class="flex-1 min-w-0">
                    <div id="user-username" class="text-xs font-semibold text-white truncate">Carregando...</div>
                    <div id="user-tag" class="text-[10px] text-discord-muted truncate">#0000</div>
                </div>
            </div>
            <button onclick="logoutUser()" class="p-1.5 hover:bg-[#f23f43] text-discord-muted hover:text-white rounded transition-colors" title="Sair">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
            </button>
        </div>
    </div>
    
    <div class="flex-1 flex flex-col bg-discord-darkest relative min-w-0">
        <div class="h-12 px-4 flex items-center justify-between border-b border-discord shadow-sm shrink-0">
            <div class="flex items-center gap-2">
                <span class="text-discord-muted text-xl hidden" id="channel-hashtag">#</span>
                <span id="current-channel-name" class="font-semibold text-white">Selecione um chat</span>
            </div>
        </div>
        
        <div id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-1">
            <div class="flex flex-col items-center justify-center h-full opacity-50">
                <p class="text-white">Escolha um servidor ou DM para começar.</p>
            </div>
        </div>
        
        <div class="px-4 pb-6 mt-2 shrink-0">
            <div class="bg-discord-sidebar rounded-lg">
                <input 
                    type="text" 
                    id="message-input" 
                    placeholder="Conversar..." 
                    class="chat-input w-full bg-transparent px-4 py-3 text-discord-normal placeholder-discord-muted outline-none disabled:opacity-50" 
                    disabled
                    onkeypress="if(event.key==='Enter') sendMessage()"
                >
            </div>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, get, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCx1ydeZ1HvunA2iedzJqLZDDwUOnXUL1c",
            authDomain: "bloxchatting.firebaseapp.com",
            databaseURL: "https://bloxchatting-default-rtdb.firebaseio.com",
            projectId: "bloxchatting",
            storageBucket: "bloxchatting.firebasestorage.app",
            messagingSenderId: "600333968159",
            appId: "1:600333968159:web:7a57e0e8ae2eed30a6062a"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let currentUser = null;
        let currentServerId = null;
        let currentChannelId = null;
        
        // 1. TRAVA DE SEGURANÇA (Auth Guard)
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // Se não estiver logado, chuta para o index.html
                window.location.href = "index.html"; 
                return;
            }
            currentUser = user;
            
            // Carrega perfil visual
            const userSnap = await get(ref(db, `users/${user.uid}`));
            if(userSnap.exists()) {
                const data = userSnap.val();
                document.getElementById('user-username').textContent = data.username;
                document.getElementById('user-tag').textContent = `#${data.tag || '0000'}`;
            } else {
                document.getElementById('user-username').textContent = user.email.split('@')[0];
            }
            
            loadServers();
            loadDMs();
        });

        // 2. FUNÇÃO DE LOGOUT
        window.logoutUser = () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            }).catch((error) => {
                alert("Erro ao sair: " + error.message);
            });
        };

        // 3. CARREGAR SERVIDORES
        function loadServers() {
            onValue(ref(db, `servers`), (snapshot) => {
                const container = document.getElementById('servers-list');
                container.innerHTML = '';
                
                if (!snapshot.exists()) return;

                snapshot.forEach(child => {
                    const server = child.val();
                    const btn = document.createElement('button');
                    btn.className = `server-icon w-12 h-12 rounded-full overflow-hidden hover:rounded-2xl transition-all ${currentServerId === child.key ? 'active' : ''}`;
                    btn.innerHTML = `<img src="https://ui-avatars.com/api/?name=${encodeURIComponent(server.name)}&background=random&color=fff" class="w-full h-full object-cover">`;
                    btn.onclick = () => selectServer(child.key, server.name);
                    container.appendChild(btn);
                });
            });
        }

        // 4. CARREGAR CANAIS
        function loadChannels(serverId) {
            onValue(ref(db, `servers/${serverId}/channels`), (snapshot) => {
                const container = document.getElementById('channels-list-container');
                container.innerHTML = '';
                
                if (!snapshot.exists()) {
                    container.innerHTML = `<p class="text-xs text-discord-muted px-3">Sem canais</p>`;
                    return;
                }

                let firstChannel = null;
                snapshot.forEach(child => {
                    if (!firstChannel) firstChannel = child.key;
                    
                    const channel = child.val();
                    const div = document.createElement('div');
                    div.className = `channel-item px-2 py-1 rounded cursor-pointer flex items-center gap-2 text-sm mx-1 ${currentChannelId === child.key ? 'channel-active' : ''}`;
                    div.innerHTML = `<span class="text-discord-muted">#</span> <span>${channel.name}</span>`;
                    div.onclick = () => selectChannel(child.key, channel.name, 'server');
                    container.appendChild(div);
                });

                if (firstChannel && !currentChannelId) {
                    const chData = snapshot.val()[firstChannel];
                    selectChannel(firstChannel, chData.name, 'server');
                }
            });
        }

        // 5. CARREGAR MENSAGENS
        function loadMessages() {
            if (!currentChannelId) return;

            const input = document.getElementById('message-input');
            input.disabled = false; // Ativa o input

            let path = currentServerId 
                ? `servers/${currentServerId}/channels/${currentChannelId}/messages`
                : `dms/${currentChannelId}/messages`;

            onValue(ref(db, path), (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';

                if (!snapshot.exists()) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full opacity-50">
                            <p class="text-white font-medium">O chat está vazio.</p>
                            <p class="text-xs text-discord-muted">Seja o primeiro a enviar uma mensagem!</p>
                        </div>`;
                    return;
                }

                const msgs = [];
                snapshot.forEach(child => msgs.push(child.val()));
                msgs.sort((a, b) => a.timestamp - b.timestamp);

                msgs.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'message-item py-1 px-2 rounded flex gap-3';
                    const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    div.innerHTML = `
                        <img src="${msg.userAvatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(msg.username)}" class="w-10 h-10 rounded-full mt-1 shrink-0">
                        <div class="min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="font-semibold text-white text-sm hover:underline cursor-pointer">${msg.username}</span>
                                <span class="text-xs text-discord-muted">${time}</span>
                            </div>
                            <div class="text-discord-normal text-sm break-words">${msg.content}</div>
                        </div>
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        // 6. ENVIAR MENSAGEM
        window.sendMessage = async () => {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content || !currentUser || !currentChannelId) return;

            input.value = ''; // Limpa rápido para fluidez

            const userSnap = await get(ref(db, `users/${currentUser.uid}`));
            const userData = userSnap.val() || { username: currentUser.email.split('@')[0] };

            const path = currentServerId 
                ? `servers/${currentServerId}/channels/${currentChannelId}/messages`
                : `dms/${currentChannelId}/messages`;

            await push(ref(db, path), {
                userId: currentUser.uid,
                username: userData.username,
                content: content,
                timestamp: Date.now()
            });
        };

        // 7. NAVEGAÇÃO
        window.selectServer = (serverId, serverName) => {
            currentServerId = serverId;
            currentChannelId = null; 
            
            document.getElementById('dms-view').classList.add('hidden');
            document.getElementById('server-channels-view').classList.remove('hidden');
            document.getElementById('server-name').textContent = serverName;
            document.getElementById('channel-hashtag').classList.remove('hidden');
            
            document.querySelectorAll('.server-icon').forEach(el => el.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
            
            loadChannels(serverId);
        };

        window.selectChannel = (channelId, channelName, type) => {
            currentChannelId = channelId;
            document.getElementById('current-channel-name').textContent = channelName;
            document.getElementById('message-input').placeholder = `Conversar em #${channelName}...`;
            
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('channel-active'));
            if(event && event.currentTarget) event.currentTarget.classList.add('channel-active');
            
            loadMessages();
        };

        window.showDMs = () => {
            currentServerId = null;
            currentChannelId = null;
            
            document.getElementById('dms-view').classList.remove('hidden');
            document.getElementById('server-channels-view').classList.add('hidden');
            document.getElementById('server-name').textContent = 'Mensagens Diretas';
            document.getElementById('current-channel-name').textContent = 'Amigos';
            document.getElementById('channel-hashtag').classList.add('hidden');
            
            document.getElementById('messages-container').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full opacity-50">
                    <p class="text-white">Selecione uma DM para conversar.</p>
                </div>`;
            document.getElementById('message-input').disabled = true;
            document.getElementById('message-input').placeholder = "Selecione um amigo primeiro...";
            
            document.querySelectorAll('.server-icon').forEach(el => el.classList.remove('active'));
            document.getElementById('home-btn').classList.add('active');
        };

        // 8. CRIAÇÃO BÁSICA
        window.createNewServer = async () => {
            const name = prompt("Nome do novo Servidor:");
            if (!name) return;
            const newServerRef = push(ref(db, 'servers'));
            await set(newServerRef, { name: name, owner: currentUser.uid });
            await push(ref(db, `servers/${newServerRef.key}/channels`), { name: 'geral' });
        };

        window.createNewChannel = async () => {
            if (!currentServerId) return;
            const name = prompt("Nome do novo Canal (ex: avisos):");
            if (!name) return;
            await push(ref(db, `servers/${currentServerId}/channels`), { name: name.toLowerCase().replace(/\s/g, '-') });
        };

        function loadDMs() {
            document.getElementById('friends-list-container').innerHTML = `<p class="text-xs text-discord-muted px-2">Suas DMs aparecerão aqui em breve.</p>`;
        }
        
        window.showFindFriend = () => {
            alert("Sistema de buscar amigos será implementado em breve!");
        };
    </script>
</body>
</html>
