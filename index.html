<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxChatting - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #313338; }
        .auth-card { background: #1e1f22; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        input { background: #1e1f22; border: 1px solid #1a1b1e; color: #dbdee1; transition: border 0.2s; }
        input:focus { border-color: #5865f2; outline: none; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="auth-card w-full max-w-md p-8 rounded-lg text-center">
        <div id="login-form">
            <h1 class="text-2xl font-bold text-white mb-2">Boas-vindas de volta!</h1>
            <p class="text-discord-muted mb-6 text-[#949ba4]">Estamos tão animados em te ver de novo!</p>
            
            <div class="text-left space-y-4">
                <div>
                    <label class="text-xs font-bold text-[#b5bac1] uppercase">E-mail</label>
                    <input type="email" id="login-email" class="w-full p-2.5 rounded mt-1 bg-[#1e1f22]">
                </div>
                <div>
                    <label class="text-xs font-bold text-[#b5bac1] uppercase">Senha</label>
                    <input type="password" id="login-password" class="w-full p-2.5 rounded mt-1 bg-[#1e1f22]">
                </div>
                <button onclick="handleLogin()" class="w-full bg-[#5865f2] hover:bg-[#4752c4] text-white py-2.5 rounded font-medium transition-colors mt-2">Entrar</button>
            </div>
            <p class="text-sm text-[#949ba4] mt-4">Precisando de uma conta? <a href="#" onclick="toggleAuth()" class="text-[#00a8fc] hover:underline">Registre-se</a></p>
        </div>

        <div id="register-form" class="hidden">
            <h1 class="text-2xl font-bold text-white mb-2">Criar uma conta</h1>
            
            <div class="text-left space-y-4">
                <div>
                    <label class="text-xs font-bold text-[#b5bac1] uppercase">E-mail</label>
                    <input type="email" id="reg-email" class="w-full p-2.5 rounded mt-1 bg-[#1e1f22]">
                </div>
                <div>
                    <label class="text-xs font-bold text-[#b5bac1] uppercase">Nome de Usuário</label>
                    <input type="text" id="reg-username" class="w-full p-2.5 rounded mt-1 bg-[#1e1f22]">
                </div>
                <div>
                    <label class="text-xs font-bold text-[#b5bac1] uppercase">Senha</label>
                    <input type="password" id="reg-password" class="w-full p-2.5 rounded mt-1 bg-[#1e1f22]">
                </div>
                <button onclick="handleRegister()" class="w-full bg-[#5865f2] hover:bg-[#4752c4] text-white py-2.5 rounded font-medium transition-colors mt-2">Continuar</button>
            </div>
            <p class="text-sm text-[#949ba4] mt-4">Já tem uma conta? <a href="#" onclick="toggleAuth()" class="text-[#00a8fc] hover:underline">Entrar</a></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx1ydeZ1HvunA2iedzJqLZDDwUOnXUL1c",
            authDomain: "bloxchatting.firebaseapp.com",
            databaseURL: "https://bloxchatting-default-rtdb.firebaseio.com",
            projectId: "bloxchatting",
            storageBucket: "bloxchatting.firebasestorage.app",
            messagingSenderId: "600333968159",
            appId: "1:600333968159:web:7a57e0e8ae2eed30a6062a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.toggleAuth = () => {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        };

        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => window.location.href = 'home.html')
                .catch(err => alert("Erro no login: " + err.message));
        };

        window.handleRegister = () => {
            const email = document.getElementById('reg-email').value;
            const user = document.getElementById('reg-username').value;
            const pass = document.getElementById('reg-password').value;

            createUserWithEmailAndPassword(auth, email, pass)
                .then((cred) => {
                    set(ref(db, 'users/' + cred.user.uid), {
                        username: user,
                        email: email,
                        tag: Math.floor(1000 + Math.random() * 9000)
                    });
                    window.location.href = 'home.html';
                })
                .catch(err => alert("Erro no registro: " + err.message));
        };
    </script>
</body>
</html>
